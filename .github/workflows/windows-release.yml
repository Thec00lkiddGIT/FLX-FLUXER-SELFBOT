name: Windows Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Build Windows app
        run: pyinstaller build/flx.spec --clean --noconfirm

      - name: Zip Windows release
        shell: pwsh
        run: |
          Compress-Archive -Path dist/FLX-FLUXER-SELFBOT -DestinationPath dist/FLX-FLUXER-SELFBOT-Windows.zip -Force

      - name: Upload to v1.0.0 release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          files: dist/FLX-FLUXER-SELFBOT-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
