# When someone publishes a release from the GitHub UI, post a friendly note to #releases.
#
# Releases made by the main Release workflow use GITHUB_TOKEN and won't trigger this —
# those get announced from release.yml instead.
#
# Setup once: gh secret set FLUXER_RELEASES_WEBHOOK_URL < releases_webhook.url

name: Fluxer release notify

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  notify-fluxer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tell #releases about the new version
        env:
          FLUXER_RELEASES_WEBHOOK_URL: ${{ secrets.FLUXER_RELEASES_WEBHOOK_URL }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python3 scripts/notify_fluxer_release.py
