# Builds FLX for Mac, Windows, and Chromebook when you push a v* tag.
# Also posts to your Fluxer #releases webhook after the GitHub release goes live.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Tag to ship (e.g. v1.0.8)"
        required: true
        default: "v1.0.8"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt -r requirements-build.txt
          python scripts/prepare_icons.py

      - name: Build macOS app
        run: pyinstaller build/flx.spec --clean --noconfirm

      - name: Zip macOS release
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "FLX.app" FLX-macOS.zip

      - uses: actions/upload-artifact@v4
        with:
          name: FLX-macOS
          path: dist/FLX-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt -r requirements-build.txt
          python scripts/prepare_icons.py

      - name: Build Windows app
        run: pyinstaller build/flx.spec --clean --noconfirm

      - name: Zip Windows release
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/FLX" -DestinationPath "dist/FLX-Windows.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: FLX-Windows
          path: dist/FLX-Windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            pkg-config

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt -r requirements-build.txt
          python scripts/prepare_icons.py

      - name: Build Linux app
        run: pyinstaller build/flx.spec --clean --noconfirm

      - name: Package Chromebook zip
        run: |
          chmod +x dist/FLX/FLX
          cp scripts/run_chromebook.sh dist/FLX/run-chromebook.sh
          chmod +x dist/FLX/run-chromebook.sh
          cp assets/icon.png dist/FLX/icon.png
          cd dist
          zip -r FLX-ChromeOS.zip FLX

      - uses: actions/upload-artifact@v4
        with:
          name: FLX-ChromeOS
          path: dist/FLX-ChromeOS.zip

  publish:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read release notes from the tag
        id: notes
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" --force 2>/dev/null || true
          BODY="$(git tag -l --format='%(contents:subject)' "$TAG" 2>/dev/null | head -1)"
          if [ -z "$BODY" ] || [ "$BODY" = "$TAG" ]; then
            BODY="$(git tag -l --format='%(contents)' "$TAG" 2>/dev/null | sed '/^$/d' | head -1)"
          fi
          if [ -z "$BODY" ]; then
            BODY="Update for $TAG"
          fi
          {
            echo "tag=$TAG"
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: FLX ${{ steps.notes.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            artifacts/FLX-macOS/FLX-macOS.zip
            artifacts/FLX-Windows/FLX-Windows.zip
            artifacts/FLX-ChromeOS/FLX-ChromeOS.zip
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Token-created releases don't trigger release:published — we announce here instead.
      - name: Post to Fluxer #releases
        env:
          FLUXER_RELEASES_WEBHOOK_URL: ${{ secrets.FLUXER_RELEASES_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${FLUXER_RELEASES_WEBHOOK_URL:-}" ]; then
            echo "No Fluxer webhook secret — skipping #releases post."
            exit 0
          fi
          export RELEASE_NAME=$(gh release view "$RELEASE_TAG" --json name -q .name)
          export RELEASE_BODY=$(gh release view "$RELEASE_TAG" --json body -q .body)
          export RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
          python3 scripts/notify_fluxer_release.py
