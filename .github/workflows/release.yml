# Copy this file to .github/workflows/release.yml on GitHub to enable CI builds.
# Or: gh auth refresh -h github.com -s workflow && git push origin main

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v1.0.7)"
        required: true
        default: "v1.0.7"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt -r requirements-build.txt
          python scripts/prepare_icons.py

      - name: Build macOS app
        run: pyinstaller build/flx.spec --clean --noconfirm

      - name: Zip macOS release
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "FLX.app" FLX-macOS.zip

      - uses: actions/upload-artifact@v4
        with:
          name: FLX-macOS
          path: dist/FLX-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt -r requirements-build.txt
          python scripts/prepare_icons.py

      - name: Build Windows app
        run: pyinstaller build/flx.spec --clean --noconfirm

      - name: Zip Windows release
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/FLX" -DestinationPath "dist/FLX-Windows.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: FLX-Windows
          path: dist/FLX-Windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            pkg-config

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt -r requirements-build.txt
          python scripts/prepare_icons.py

      - name: Build Linux app
        run: pyinstaller build/flx.spec --clean --noconfirm

      - name: Package Chromebook zip
        run: |
          chmod +x dist/FLX/FLX
          cp scripts/run_chromebook.sh dist/FLX/run-chromebook.sh
          chmod +x dist/FLX/run-chromebook.sh
          cp assets/icon.png dist/FLX/icon.png
          cd dist
          zip -r FLX-ChromeOS.zip FLX

      - uses: actions/upload-artifact@v4
        with:
          name: FLX-ChromeOS
          path: dist/FLX-ChromeOS.zip

  publish:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          name: FLX ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          files: |
            artifacts/FLX-macOS/FLX-macOS.zip
            artifacts/FLX-Windows/FLX-Windows.zip
            artifacts/FLX-ChromeOS/FLX-ChromeOS.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
